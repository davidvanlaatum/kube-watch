<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kube Watch</title>
  <style>body{font-family:Arial;margin:16px} #controls{margin-bottom:12px} table{border-collapse:collapse;width:100%} th,td{border:1px solid #ddd;padding:6px} tr:nth-child(even){background:#f9f9f9} pre{background:#222;color:#dff;padding:8px;overflow:auto}</style>
</head>
<body>
  <h2>Kube Watch — Real-time</h2>
  <div id="controls">
    Cluster: <select id="cluster"></select>
    Resource: <select id="resource"></select>
    <button id="open">Open Stream</button>
    <button id="close" disabled>Close</button>
  </div>

  <div id="status" style="margin-bottom:8px;color:#444">(status)</div>

  <div id="listview"></div>
  <h3>Details</h3>
  <pre id="details">Select a row to see YAML/JSON</pre>

  <script src="app.js"></script>
</body>
</html>
